<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatMan-Pro — Завантаження</title>
<meta name="description" content="Завантажити CatMan-Pro для Windows (.exe) та Android (.apk)">
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #1a1d21;
    --muted: #5b6270;
    --border: #e2e5ea;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --android: #3ddc84;
    --android-hover: #2fc470;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --card: #1d2025;
      --text: #eef0f3;
      --muted: #9aa2af;
      --border: #2b2f36;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --android: #3ddc84;
      --android-hover: #4eeb93;
    }
  }
  :root[data-theme="dark"] {
    --bg: #14161a; --card: #1d2025; --text: #eef0f3; --muted: #9aa2af; --border: #2b2f36;
    --accent: #3b82f6; --accent-hover: #60a5fa; --android: #3ddc84; --android-hover: #4eeb93;
  }
  :root[data-theme="light"] {
    --bg: #f5f6f8; --card: #ffffff; --text: #1a1d21; --muted: #5b6270; --border: #e2e5ea;
    --accent: #2563eb; --accent-hover: #1d4ed8; --android: #3ddc84; --android-hover: #2fc470;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
  }
  h1 {
    font-size: 1.7rem;
    margin: 0 0 6px;
  }
  .subtitle {
    color: var(--muted);
    margin: 0 0 28px;
    font-size: 0.95rem;
  }
  .version {
    display: inline-block;
    font-size: 0.8rem;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
    margin-bottom: 28px;
  }
  .downloads {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1.02rem;
    color: #fff;
    transition: background 0.15s ease;
  }
  .btn small {
    font-weight: 400;
    opacity: 0.85;
    font-size: 0.82rem;
  }
  .btn-windows { background: var(--accent); }
  .btn-windows:hover { background: var(--accent-hover); }
  .btn-android { background: var(--android); color: #06331b; }
  .btn-android:hover { background: var(--android-hover); }
  .icon { width: 20px; height: 20px; flex-shrink: 0; }
  footer {
    margin-top: 28px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>
  <div class="card">
    <h1>CatMan-Pro</h1>
    <p class="subtitle">Програма для управління асортиментом і замовленнями</p>
    <div class="version" id="version">Завантаження інформації про версію…</div>

    <div class="downloads">
      <a class="btn btn-windows" href="https://github.com/vitalik19970527-prog/CatMan-Pro/releases/latest/download/CatManPro-Setup.exe">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.5L10.5 4.4V11.4H3V5.5M11.5 4.3L21 3V11.3H11.5V4.3M3 12.4H10.5V19.5L3 18.4V12.4M11.5 12.4H21V20.9L11.5 19.6V12.4Z"/></svg>
        <span>Завантажити для Windows <small>(.exe)</small></span>
      </a>
      <a class="btn btn-android" href="https://github.com/vitalik19970527-prog/CatMan-Pro/releases/latest/download/CatManPro-android.apk">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.523 15.34l1.987-3.44a.416.416 0 00-.152-.567.416.416 0 00-.567.152l-2.01 3.483a11.36 11.36 0 00-4.781-1.031c-1.71 0-3.316.371-4.781 1.03L5.209 11.49a.416.416 0 00-.567-.152.416.416 0 00-.152.567l1.987 3.44C3.24 17.18.9 20.4.5 24h23c-.4-3.6-2.74-6.82-5.977-8.66zM7 20a1 1 0 110-2 1 1 0 010 2zm10 0a1 1 0 110-2 1 1 0 010 2z"/></svg>
        <span>Завантажити для Android <small>(.apk)</small></span>
      </a>
    </div>

    <footer>
      <a href="https://github.com/vitalik19970527-prog/CatMan-Pro">Репозиторій на GitHub</a>
    </footer>
  </div>

  <script>
    fetch("https://api.github.com/repos/vitalik19970527-prog/CatMan-Pro/releases/latest")
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(rel => {
        const el = document.getElementById("version");
        const date = new Date(rel.published_at).toLocaleDateString("uk-UA");
        el.textContent = "Версія " + rel.tag_name.replace(/^v/, "") + " · " + date;
      })
      .catch(() => {
        document.getElementById("version").remove();
      });
  </script>
</body>
</html>
